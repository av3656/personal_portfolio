<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#1e293b"/>
  <text x="200" y="30" text-anchor="middle" fill="white" font-family="monospace" font-size="14">API Endpoints</text>
  <rect x="30" y="50" width="340" height="220" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="40" y="70" fill="#22d3ee" font-family="monospace" font-size="10">GET /api/users</text>
  <text x="40" y="90" fill="#22d3ee" font-family="monospace" font-size="10">POST /api/users</text>
  <text x="40" y="110" fill="#22d3ee" font-family="monospace" font-size="10">PUT /api/users/{id}</text>
  <text x="40" y="130" fill="#22d3ee" font-family="monospace" font-size="10">DELETE /api/users/{id}</text>
  <rect x="40" y="150" width="300" height="100" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="50" y="170" fill="white" font-family="monospace" font-size="9">Response Example:</text>
  <text x="50" y="190" fill="white" font-family="monospace" font-size="8">{</text>
  <text x="60" y="205" fill="white" font-family="monospace" font-size="8">"id": 1,</text>
  <text x="60" y="220" fill="white" font-family="monospace" font-size="8">"name": "John Doe"</text>
  <text x="60" y="235" fill="white" font-family="monospace" font-size="8">}</text>
</svg>
