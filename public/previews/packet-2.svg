<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#1e293b"/>
  <text x="200" y="50" text-anchor="middle" fill="white" font-family="monospace" font-size="14">Packet Analysis View</text>
  <rect x="30" y="80" width="340" height="200" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="40" y="100" fill="#22d3ee" font-family="monospace" font-size="10">Source: 192.168.1.1</text>
  <text x="40" y="120" fill="#22d3ee" font-family="monospace" font-size="10">Dest: 192.168.1.2</text>
  <text x="40" y="140" fill="#22d3ee" font-family="monospace" font-size="10">Protocol: TCP</text>
  <text x="40" y="160" fill="#22d3ee" font-family="monospace" font-size="10">Size: 1024 bytes</text>
  <rect x="40" y="180" width="300" height="80" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="50" y="200" fill="white" font-family="monospace" font-size="9">Data Payload...</text>
</svg>
